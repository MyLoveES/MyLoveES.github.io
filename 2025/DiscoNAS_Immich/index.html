yword">for</span> accelerated transcoding</span><br><span class="line">    <span class="attr">volumes</span>:</span><br><span class="line">      # <span class="title class_">Do</span> not edit the next line. <span class="title class_">If</span> you want to change the media storage location on your system, edit the value <span class="keyword">of</span> <span class="variable constant_">UPLOAD_LOCATION</span> <span class="keyword">in</span> the .<span class="property">env</span> file</span><br><span class="line">      - <span class="regexp">/share/</span><span class="title class_">Container</span>/container-station-data/application/immich/server/<span class="attr">library</span>:<span class="regexp">/usr/</span>src/app/upload</span><br><span class="line">      - <span class="regexp">/share/</span><span class="title class_">CACHEDEV1</span>_DATA/<span class="title class_">Weasley</span>/<span class="title class_">Pictures</span>:<span class="regexp">/external/</span><span class="title class_">Weasley</span>/<span class="title class_">Pictures</span>:ro</span><br><span class="line">      - <span class="regexp">/etc/</span><span class="attr">localtime</span>:<span class="regexp">/etc/</span><span class="attr">localtime</span>:ro</span><br><span class="line">    <span class="attr">environment</span>:</span><br><span class="line">      - <span class="variable constant_">TZ</span>=<span class="title class_">Asia</span>/<span class="title class_">Shanghai</span></span><br><span class="line">      - <span class="variable constant_">DB_USERNAME</span>=postgres</span><br><span class="line">      - <span class="variable constant_">DB_PASSWORD</span>=postgres</span><br><span class="line">      - <span class="variable constant_">DB_DATABASE_NAME</span>=immich</span><br><span class="line">    <span class="attr">ports</span>:</span><br><span class="line">      - <span class="string">&#x27;2283:2283&#x27;</span></span><br><span class="line">    <span class="attr">depends_on</span>:</span><br><span class="line">      - redis</span><br><span class="line">      - database</span><br><span class="line">    <span class="attr">networks</span>:</span><br><span class="line">      - immich</span><br><span class="line">    <span class="attr">restart</span>: always</span><br><span class="line">    <span class="attr">healthcheck</span>:</span><br><span class="line">      <span class="attr">disable</span>: <span class="literal">false</span></span><br><span class="line"></span><br><span class="line">  immich-machine-<span class="attr">learning</span>:</span><br><span class="line">    <span class="attr">container_name</span>: immich_machine_learning</span><br><span class="line">    # <span class="title class_">For</span> hardware acceleration, add one <span class="keyword">of</span> -[armnn, cuda, rocm, openvino, rknn] to the image tag.</span><br><span class="line">    # <span class="title class_">Example</span> <span class="attr">tag</span>: $&#123;<span class="attr">IMMICH_VERSION</span>:-release&#125;-cuda</span><br><span class="line">    <span class="attr">image</span>: ghcr.<span class="property">io</span>/immich-app/immich-machine-<span class="attr">learning</span>:v1<span class="number">.135</span><span class="number">.3</span></span><br><span class="line">    # <span class="attr">extends</span>: # uncomment <span class="variable language_">this</span> section <span class="keyword">for</span> hardware acceleration - see <span class="attr">https</span>:<span class="comment">//immich.app/docs/features/ml-hardware-acceleration</span></span><br><span class="line">    #   <span class="attr">file</span>: hwaccel.<span class="property">ml</span>.<span class="property">yml</span></span><br><span class="line">    #   <span class="attr">service</span>: cpu # set to one <span class="keyword">of</span> [armnn, cuda, rocm, openvino, openvino-wsl, rknn] <span class="keyword">for</span> accelerated inference - use the <span class="string">`-wsl`</span> version <span class="keyword">for</span> <span class="title class_">WSL2</span> where applicable</span><br><span class="line">    <span class="attr">volumes</span>:</span><br><span class="line">      - <span class="regexp">/share/</span><span class="title class_">Container</span>/container-station-data/application/immich/machine_learning/<span class="attr">model_cache</span>:/cache</span><br><span class="line">    <span class="attr">restart</span>: always</span><br><span class="line">    <span class="attr">networks</span>:</span><br><span class="line">      - immich</span><br><span class="line">    <span class="attr">healthcheck</span>:</span><br><span class="line">      <span class="attr">disable</span>: <span class="literal">false</span></span><br><span class="line"></span><br><span class="line">  <span class="attr">redis</span>:</span><br><span class="line">    <span class="attr">container_name</span>: immich_redis</span><br><span class="line">    <span class="attr">image</span>: docker.<span class="property">io</span>/valkey/<span class="attr">valkey</span>:<span class="number">8</span>-bookworm</span><br><span class="line">    <span class="attr">networks</span>:</span><br><span class="line">      - immich</span><br><span class="line">    <span class="attr">healthcheck</span>:</span><br><span class="line">      <span class="attr">test</span>: redis-cli ping || exit <span class="number">1</span></span><br><span class="line">    <span class="attr">restart</span>: always</span><br><span class="line"></span><br><span class="line">  <span class="attr">database</span>:</span><br><span class="line">    <span class="attr">container_name</span>: immich_postgres</span><br><span class="line">    <span class="attr">image</span>: ghcr.<span class="property">io</span>/immich-app/<span class="attr">postgres</span>:<span class="number">14</span>-vectorchord0<span class="number">.4</span><span class="number">.3</span>-pgvectors0<span class="number">.2</span><span class="number">.0</span></span><br><span class="line">    <span class="attr">environment</span>:</span><br><span class="line">      <span class="attr">POSTGRES_PASSWORD</span>: postgres</span><br><span class="line">      <span class="attr">POSTGRES_USER</span>: postgres</span><br><span class="line">      <span class="attr">POSTGRES_DB</span>: immich</span><br><span class="line">      <span class="attr">POSTGRES_INITDB_ARGS</span>: <span class="string">&#x27;--data-checksums&#x27;</span></span><br><span class="line">      # <span class="title class_">Uncomment</span> the <span class="attr">DB_STORAGE_TYPE</span>: <span class="string">&#x27;HDD&#x27;</span> <span class="keyword">var</span> <span class="keyword">if</span> your database isn<span class="string">&#x27;t stored on SSDs</span></span><br><span class="line"><span class="string">      # DB_STORAGE_TYPE: &#x27;</span><span class="variable constant_">HDD</span><span class="string">&#x27;</span></span><br><span class="line"><span class="string">    networks:</span></span><br><span class="line"><span class="string">      - immich</span></span><br><span class="line"><span class="string">    volumes:</span></span><br><span class="line"><span class="string">      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file</span></span><br><span class="line"><span class="string">      - /share/Container/container-station-data/application/immich/Postgres/data:/var/lib/postgresql/data</span></span><br><span class="line"><span class="string">    restart: always</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">volumes:</span></span><br><span class="line"><span class="string">  model-cache:</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">networks:</span></span><br><span class="line"><span class="string"> immich:</span></span><br></pre></td></tr></table></figure>
<h2 id="1-模型下载"><a class="header-anchor" href="#1-模型下载"></a>1. 模型下载</h2>
<p>NAS上由于网络问题，无法从hf上加载对应的模型，需要先下载到本地，再手动上传到NAS。</p>
<figure class="highlight jsx"><table><tr><td class="code"><pre><span class="line"># 下载模型</span><br><span class="line"></span><br><span class="line"><span class="attr">https</span>:<span class="comment">//huggingface.co/immich-app</span></span><br><span class="line"></span><br><span class="line">## buffalo_l 用于人脸识别</span><br><span class="line">huggingface-cli download immich-app/buffalo_l --local-dir immich-app-buffalo_l</span><br><span class="line"></span><br><span class="line">## <span class="variable constant_">XLM</span>-<span class="title class_">Roberta</span>-<span class="title class_">Large</span>-<span class="title class_">Vit</span>-B-16Plus用于智能搜索</span><br><span class="line">huggingface-cli download immich-app/<span class="variable constant_">XLM</span>-<span class="title class_">Roberta</span>-<span class="title class_">Large</span>-<span class="title class_">Vit</span>-B-16Plus --local-dir immich-app-<span class="variable constant_">XLM</span>-<span class="title class_">Roberta</span>-<span class="title class_">Large</span>-<span class="title class_">Vit</span>-B-16Plus</span><br></pre></td></tr></table></figure>
<p>NAS上模型目录结构</p>
<figure class="highlight jsx"><table><tr><td class="code"><pre><span class="line">.</span><br><span class="line">|____model_cache</span><br><span class="line">| |____clip</span><br><span class="line">| | |____XLM-<span class="title class_">Roberta</span>-<span class="title class_">Large</span>-<span class="title class_">Vit</span>-B-16Plus</span><br><span class="line">| | | |____textual</span><br><span class="line">| | | |____visual</span><br><span class="line">| | | |____.<span class="property">cache</span></span><br><span class="line">| |____facial-recognition</span><br><span class="line">| | |____buffalo_l</span><br><span class="line">| | | |____recognition</span><br><span class="line">| | | |____.<span class="property">cache</span></span><br><span class="line">| | | |____detection</span><br></pre></td></tr></table></figure>
