<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="keyword">class</span> <span class="title class_">Solution</span> &#123;</span><br><span class="line">    <span class="keyword">public</span> <span class="type">int</span> <span class="title function_">minAbsoluteSumDiff</span><span class="params">(<span class="type">int</span>[] nums1, <span class="type">int</span>[] nums2)</span> &#123;</span><br><span class="line">        <span class="keyword">final</span> <span class="type">int</span> <span class="variable">MOD</span> <span class="operator">=</span> <span class="number">1000000007</span>;</span><br><span class="line">        <span class="type">int</span> <span class="variable">n</span> <span class="operator">=</span> nums1.length;</span><br><span class="line">        <span class="type">int</span>[] rec = <span class="keyword">new</span> <span class="title class_">int</span>[n];</span><br><span class="line">        System.arraycopy(nums1, <span class="number">0</span>, rec, <span class="number">0</span>, n);</span><br><span class="line">        Arrays.sort(rec);</span><br><span class="line">        <span class="type">int</span> <span class="variable">sum</span> <span class="operator">=</span> <span class="number">0</span>, maxGap = <span class="number">0</span>;</span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">0</span>; i &lt; n; i++) &#123;</span><br><span class="line">            <span class="type">int</span> <span class="variable">gap</span> <span class="operator">=</span> Math.abs(nums1[i] - nums2[i]);</span><br><span class="line">            sum = (gap + sum) % MOD;</span><br><span class="line">            <span class="type">int</span> <span class="variable">nearOne</span> <span class="operator">=</span> getHigherPos(rec, nums2[i]);</span><br><span class="line">            <span class="keyword">if</span> (nearOne &lt; n) &#123;</span><br><span class="line">                maxGap = Math.max(maxGap, gap - (rec[nearOne] - nums2[i]));</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">if</span> (nearOne &gt; <span class="number">0</span>) &#123;</span><br><span class="line">                maxGap = Math.max(maxGap, gap - (nums2[i] - rec[nearOne - <span class="number">1</span>]));</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> (sum - maxGap + MOD) % MOD;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    </span><br><span class="line">    <span class="keyword">private</span> <span class="type">int</span> <span class="title function_">getHigherPos</span><span class="params">(<span class="type">int</span>[] arr, <span class="type">int</span> target)</span> &#123;</span><br><span class="line">        <span class="type">int</span> <span class="variable">low</span> <span class="operator">=</span> <span class="number">0</span>, high = arr.length - <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">if</span> (arr[high] &lt; target) &#123;</span><br><span class="line">            <span class="keyword">return</span> high + <span class="number">1</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            <span class="keyword">while</span> (low &lt; high) &#123;</span><br><span class="line">                <span class="type">int</span> <span class="variable">mid</span> <span class="operator">=</span> (high - low) / <span class="number">2</span> + low;</span><br><span class="line">                <span class="keyword">if</span> (arr[mid] &gt; target) &#123;</span><br><span class="line">                    high = mid;</span><br><span class="line">                &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">                    low = mid + <span class="number">1</span>;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> low;</span><br><span class="line">    &#125; </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></div></div><div class="post-main post-comment"><div id="disqus_thread"></div><script type="text/javascript">
