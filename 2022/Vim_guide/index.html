<figure class="highlight plaintext"><table><tr><td class="code"><pre><span class="line">if filereadable(expand(&quot;~/.vimrc.bundles&quot;))</span><br><span class="line">  source ~/.vimrc.bundles</span><br><span class="line">endif</span><br><span class="line"></span><br><span class="line">syntax enable</span><br><span class="line">&quot;set background=light</span><br><span class="line">&quot;colorscheme solarized</span><br><span class="line"></span><br><span class="line">let mapleader=&quot;,&quot;</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot; Plugins  --------------------------------</span><br><span class="line">&quot; ys, cs, ds,  S</span><br><span class="line">&quot; set surround</span><br><span class="line">&quot; gcc, gc + motion, v_gc</span><br><span class="line">&quot; set commentary</span><br><span class="line">&quot; argument text objects: aa, ia</span><br><span class="line">&quot; set argtextobj</span><br><span class="line">&quot; cx&#123;motion&#125; to select, again to exchange</span><br><span class="line">&quot; set exchange</span><br><span class="line">&quot; entire buffer text object: ae</span><br><span class="line">&quot; set textobj-entire</span><br><span class="line">&quot; easymotion &lt;Leader&gt; s / f</span><br><span class="line">&quot; set easymotion</span><br><span class="line">&quot; 寄存器替换</span><br><span class="line">&quot; set ReplaceWithRegister</span><br><span class="line">&quot; 文件树展示</span><br><span class="line">&quot; set NERDTree</span><br><span class="line">&quot; 复制时高亮内容</span><br><span class="line">&quot; set highlightedyank</span><br><span class="line">&quot; 空格行也能够跳转</span><br><span class="line">&quot; set vim-paragraph-motion</span><br><span class="line"></span><br><span class="line">&quot; autocmd VimEnter * NERDTree</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot; Common settings -------------------------</span><br><span class="line">&quot; 显示当前mode</span><br><span class="line">set showmode</span><br><span class="line">&quot; 光标移动时保留5行</span><br><span class="line">set so=5</span><br><span class="line">&quot; 实时查找</span><br><span class="line">set incsearch</span><br><span class="line">&quot; 显示行号</span><br><span class="line">&quot; set nu</span><br><span class="line">&quot; 忽略大小写</span><br><span class="line">set ignorecase</span><br><span class="line">&quot; 允许光标到行末</span><br><span class="line">set virtualedit=onemore</span><br><span class="line">&quot; 搜索内容高亮显示</span><br><span class="line">&quot; set hlsearch</span><br><span class="line">set tabstop=4</span><br><span class="line">set shiftwidth=4</span><br><span class="line">set expandtab</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot; Plugin settings -------------------------</span><br><span class="line">let g:argtextobj_pairs=&quot;[:],(:),&lt;:&gt;&quot;</span><br><span class="line">let g:highlightedyank_highlight_duration = &quot;1000&quot;</span><br><span class="line">autocmd StdinReadPre * let s:std_in=1</span><br><span class="line">autocmd VimEnter * if argc() == 1 &amp;&amp; isdirectory(argv()[0]) &amp;&amp; !exists(&quot;s:std_in&quot;) | exe &#x27;NERDTree&#x27; argv()[0] | wincmd p | ene | endif</span><br><span class="line">autocmd bufenter * if (winnr(&quot;$&quot;) == 1 &amp;&amp; exists(&quot;b:NERDTree&quot;) &amp;&amp; b:NERDTree.isTabTree()) | q | endif</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot; My Mappings -----------------------------</span><br><span class="line">map &lt;leader&gt;f &lt;Plug&gt;(easymotion-sn)</span><br><span class="line">map &lt;leader&gt;e &lt;Plug&gt;(easymotion-fn)</span><br><span class="line">map &lt;C-n&gt; :NERDTreeToggle&lt;CR&gt;</span><br></pre></td></tr></table></figure>
<h1>.vimrc.bundles</h1>
<figure class="highlight plaintext"><table><tr><td class="code"><pre><span class="line">set nocompatible              &quot; be iMproved, required</span><br><span class="line">filetype off                  &quot; required</span><br><span class="line"></span><br><span class="line">&quot; set the runtime path to include Vundle and initialize</span><br><span class="line">set rtp+=~/.vim/bundle/Vundle.vim</span><br><span class="line">call vundle#begin()</span><br><span class="line">&quot; alternatively, pass a path where Vundle should install plugins</span><br><span class="line">&quot;call vundle#begin(&#x27;~/some/path/here&#x27;)</span><br><span class="line"></span><br><span class="line">&quot; let Vundle manage Vundle, required</span><br><span class="line">Plugin &#x27;VundleVim/Vundle.vim&#x27;</span><br><span class="line">Plugin &#x27;tpope/vim-surround&#x27;</span><br><span class="line">Plugin &#x27;tpope/vim-commentary&#x27;</span><br><span class="line">Plugin &#x27;vim-scripts/argtextobj.vim&#x27;</span><br><span class="line">Plugin &#x27;tommcdo/vim-exchange&#x27;</span><br><span class="line">Plugin &#x27;kana/vim-textobj-user&#x27;</span><br><span class="line">Plugin &#x27;kana/vim-textobj-entire&#x27;</span><br><span class="line">Plugin &#x27;easymotion/vim-easymotion&#x27;</span><br><span class="line">Plugin &#x27;vim-scripts/ReplaceWithRegister&#x27;</span><br><span class="line">Plugin &#x27;preservim/nerdtree&#x27;</span><br><span class="line">Plugin &#x27;machakann/vim-highlightedyank&#x27;</span><br><span class="line">Plugin &#x27;dbakker/vim-paragraph-motion&#x27;</span><br><span class="line"></span><br><span class="line">call vundle#end()            &quot; required</span><br><span class="line">filetype plugin indent on    &quot; required</span><br><span class="line">&quot; Brief help</span><br><span class="line">&quot; :PluginList       - lists configured plugins</span><br><span class="line">&quot; :PluginInstall    - installs plugins; append `!` to update or just :PluginUpdate</span><br><span class="line">&quot; :PluginSearch foo - searches for foo; append `!` to refresh local cache</span><br><span class="line">&quot; :PluginClean      - confirms removal of unused plugins; append `!` to auto-approve removal</span><br></pre></td></tr></table></figure>
<h1>.ideavimrc</h1>

glish-in-normal-and-restore-in-insert</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot; Plugin settings -------------------------</span><br><span class="line">let g:argtextobj_pairs=&quot;[:],(:),&lt;:&gt;&quot;</span><br><span class="line">let g:highlightedyank_highlight_duration = &quot;1000&quot;</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot; My Mappings -----------------------------</span><br><span class="line">map &lt;leader&gt;f &lt;Plug&gt;(easymotion-s)</span><br><span class="line">map &lt;leader&gt;e &lt;Plug&gt;(easymotion-f)</span><br><span class="line"></span><br><span class="line">map &lt;leader&gt;d &lt;Action&gt;(Debug)</span><br><span class="line">map &lt;leader&gt;r &lt;Action&gt;(RenameElement)</span><br><span class="line">map &lt;leader&gt;c &lt;Action&gt;(Stop)</span><br><span class="line">map &lt;leader&gt;z &lt;Action&gt;(ToggleDistractionFreeMode)</span><br><span class="line"></span><br><span class="line">map &lt;leader&gt;s &lt;Action&gt;(SelectInProjectView)</span><br><span class="line">map &lt;leader&gt;a &lt;Action&gt;(Annotate)</span><br><span class="line">map &lt;leader&gt;h &lt;Action&gt;(Vcs.ShowTabbedFileHistory)</span><br><span class="line">map &lt;S-Space&gt; &lt;Action&gt;(GotoNextError)</span><br><span class="line"></span><br><span class="line">map &lt;leader&gt;= &lt;Action&gt;(ReformatCode)</span><br><span class="line"></span><br><span class="line">nnoremap &lt;Tab&gt; &gt;&gt;_</span><br><span class="line">nnoremap &lt;S-Tab&gt; &lt;&lt;_</span><br><span class="line">inoremap &lt;S-Tab&gt; &lt;C-D&gt;</span><br><span class="line">vnoremap &lt;Tab&gt; &gt;gv</span><br><span class="line">vnoremap &lt;S-Tab&gt; &lt;gv</span><br><span class="line"></span><br><span class="line">set ideastrictmode</span><br></pre></td></tr></table></figure>
